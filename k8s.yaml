apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipmi-power
  namespace: ipmi-power
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ipmi-power
  template:
    metadata:
      labels:
        app: ipmi-power
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      containers:
        - name: ipmi-power
          image: ghcr.io/caijian76/ipmi-power:main
          imagePullPolicy: Always
          args:
            - -config
            - /config/config.json
            - -interval
            - "30"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: config
          configMap:
            name: ipmi-power-config